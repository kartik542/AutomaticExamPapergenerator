<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Previous Paper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Upload Previous Exam Paper (PDF)</h2>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-info mt-3">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('upload_pdf') }}" method="POST" enctype="multipart/form-data" class="mt-4">
        <div class="mb-3">
            <label for="pdf_file" class="form-label">Select PDF File:</label>
            <input type="file" class="form-control" name="pdf_file" id="pdf_file" accept="application/pdf" required>
        </div>
        <button type="submit" class="btn btn-success">Upload & Extract</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>

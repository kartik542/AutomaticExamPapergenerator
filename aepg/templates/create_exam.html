{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Generate Exam Paper</h3>
                </div>
                <div class="card-body">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form action="{{ url_for('generate_exam') }}" method="POST">
                        <div class="form-group mb-3">
                            <label for="subject">Subject</label>
                            <input type="text" class="form-control" id="subject" name="subject" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="total_marks">Total Marks</label>
                            <input type="number" class="form-control" id="total_marks" name="total_marks" required min="10" max="100">
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="mcq_count">Multiple Choice Questions</label>
                                <input type="number" class="form-control" id="mcq_count" name="mcq_count" min="0" value="5">
                                <small class="text-muted">2 marks each</small>
                            </div>
                            <div class="col-md-4">
                                <label for="short_count">Short Answer Questions</label>
                                <input type="number" class="form-control" id="short_count" name="short_count" min="0" value="3">
                                <small class="text-muted">3 marks each</small>
                            </div>
                            <div class="col-md-4">
                                <label for="long_count">Long Answer Questions</label>
                                <input type="number" class="form-control" id="long_count" name="long_count" min="0" value="2">
                                <small class="text-muted">6 marks each</small>
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label for="difficulty">Overall Difficulty</label>
                            <select class="form-control" id="difficulty" name="difficulty">
                                <option value="Easy">Easy</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="Hard">Hard</option>
                            </select>
                        </div>

                        <div class="form-group mb-3">
                            <label for="time_limit">Time Limit (minutes)</label>
                            <input type="number" class="form-control" id="time_limit" name="time_limit" min="30" max="180" value="60">
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">Generate Exam Paper</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Calculate total marks as user changes question counts
    function updateTotalMarks() {
        const mcqCount = parseInt(document.getElementById('mcq_count').value) || 0;
        const shortCount = parseInt(document.getElementById('short_count').value) || 0;
        const longCount = parseInt(document.getElementById('long_count').value) || 0;
        
        const totalMarks = (mcqCount * 2) + (shortCount * 3) + (longCount * 6);
        document.getElementById('total_marks').value = totalMarks;
    }

    // Add event listeners to question count inputs
    document.getElementById('mcq_count').addEventListener('change', updateTotalMarks);
    document.getElementById('short_count').addEventListener('change', updateTotalMarks);
    document.getElementById('long_count').addEventListener('change', updateTotalMarks);

    // Initial calculation
    updateTotalMarks();
});
</script>
{% endblock %}
